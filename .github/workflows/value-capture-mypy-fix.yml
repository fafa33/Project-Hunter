name: Value Capture Mypy Fix

on:
  pull_request:
    branches: [main]
    paths:
      - "src/hunter/value_capture/repository.py"
      - ".github/workflows/value-capture-mypy-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Apply precise mypy fix
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/hunter/value_capture/repository.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "def _insert(self, conn: sqlite3.Connection, table: str, record: object) -> None:",
              "def _insert(\n        self,\n        conn: sqlite3.Connection,\n        table: str,\n        record: FundamentalEvidenceRecord | SupplyBasisSnapshot | ValueCaptureRuleSnapshot,\n    ) -> None:",
          )
          text = text.replace(
              "def _json_payload(record: object) -> dict[str, Any]:",
              "def _json_payload(\n    record: FundamentalEvidenceRecord | SupplyBasisSnapshot | ValueCaptureRuleSnapshot,\n) -> dict[str, Any]:",
          )
          path.write_text(text, encoding="utf-8")
          PY
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install black
      - run: black src/hunter/value_capture/repository.py
      - name: Commit fix
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hunter/value_capture/repository.py
          git commit -m "Fix value capture repository mypy typing"
          git push
