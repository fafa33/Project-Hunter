name: Value Capture Remediation Ruff Fix

on:
  pull_request:
    branches: [main]
    paths:
      - "src/hunter/value_capture/**"
      - "tests/test_value_capture_v3_5_0.py"
      - ".github/workflows/value-capture-remediation-ruff-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check --fix src/hunter/value_capture tests/test_value_capture_v3_5_0.py
      - run: python -m black src/hunter/value_capture tests/test_value_capture_v3_5_0.py
      - name: Commit fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hunter/value_capture tests/test_value_capture_v3_5_0.py
          git commit -m "Fix v3.5.0 remediation Ruff and formatting issues"
          git push
