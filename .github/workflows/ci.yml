name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/ci-constraints.txt

      - name: Install project
        env:
          PIP_CONSTRAINT: requirements/ci-constraints.txt
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check -c requirements/ci-constraints.txt -e ".[dev]"

      - name: Capture Ruff diagnostics
        id: ruff
        continue-on-error: true
        run: |
          set -o pipefail
          ruff check . 2>&1 | tee ruff.log

      - name: Upload Ruff diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostics
          path: ruff.log

      - name: Enforce Ruff result
        if: steps.ruff.outcome != 'success'
        run: exit 1

      - name: Black
        run: black --check .

      - name: Mypy
        run: mypy

      - name: Pytest
        run: pytest
