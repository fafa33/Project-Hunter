name: Value Capture Black Once

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/v3.5.0-seal-write-helpers
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install black
      - run: python -m black src/hunter/value_capture/service.py || true
      - run: python -m black src/hunter/value_capture/repository.py || true
      - run: python -m black tests/test_value_capture_service_owned_persistence.py || true
      - name: Commit formatted files through Contents API
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: fix/v3.5.0-seal-write-helpers
        run: |
          for file in \
            src/hunter/value_capture/service.py \
            src/hunter/value_capture/repository.py \
            tests/test_value_capture_service_owned_persistence.py
          do
            test -f "$file" || continue
            sha=$(gh api "repos/$GITHUB_REPOSITORY/contents/$file?ref=$BRANCH" --jq .sha)
            content=$(base64 -w0 "$file")
            gh api --method PUT "repos/$GITHUB_REPOSITORY/contents/$file" \
              -f message="Format final value capture remediation" \
              -f content="$content" \
              -f branch="$BRANCH" \
              -f sha="$sha"
          done
