name: Value Capture Black Once

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/v3.5.0-seal-write-helpers
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install black
      - run: python -m black src/hunter/value_capture/service.py src/hunter/value_capture/repository.py tests/test_value_capture_service_owned_persistence.py
      - uses: actions/upload-artifact@v4
        with:
          name: formatted-value-capture-files
          path: |
            src/hunter/value_capture/service.py
            src/hunter/value_capture/repository.py
            tests/test_value_capture_service_owned_persistence.py
