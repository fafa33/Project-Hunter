name: Value Capture Black Once

on:
  push:
    branches: [fix/v3.5.0-seal-write-helpers]
    paths:
      - ".github/workflows/value-capture-black-once.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/v3.5.0-seal-write-helpers
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install black
      - run: python -m black src/hunter/value_capture/service.py src/hunter/value_capture/repository.py tests/test_value_capture_service_owned_persistence.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hunter/value_capture/service.py src/hunter/value_capture/repository.py tests/test_value_capture_service_owned_persistence.py
          git diff --cached --quiet || git commit -m "Format final value capture remediation"
          git push
