name: Market Facts Format Helper

on:
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install 'black>=24,<25'
      - run: |
          black src/hunter/market_facts tests/test_market_facts_v3_4_0.py
          git diff --binary > black.patch
      - uses: actions/upload-artifact@v4
        with:
          name: market-facts-black-patch
          path: black.patch
