name: Black Debug

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  black-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: pip install "black>=24,<25"
      - name: Capture Black diff
        id: black
        shell: bash
        run: |
          set +e
          black --check --diff src tests config alembic > black-output.txt 2>&1
          status=$?
          {
            echo 'body<<EOF'
            echo '```diff'
            tail -n 120 black-output.txt
            echo '```'
            echo EOF
          } >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Comment Black diff
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.black.outputs.body }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY"
