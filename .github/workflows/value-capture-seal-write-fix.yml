name: Value Capture Seal Write Fix

on:
  push:
    branches: [fix/v3.5.0-seal-write-helpers]
    paths:
      - ".github/workflows/value-capture-seal-write-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/v3.5.0-seal-write-helpers
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Seal repository write helpers
        run: |
          python - <<'PY'
          from pathlib import Path

          repo = Path("src/hunter/value_capture/repository.py")
          text = repo.read_text()
          text = text.replace("from dataclasses import asdict\n", "")
          text = text.replace("Record = FundamentalEvidenceRecord | SupplyBasisSnapshot | ValueCaptureRuleSnapshot\n\n", "")
          text = text.replace("        _initialize(self.path)\n", "        self.__initialize()\n")
          text = text.replace("with _connect(self.path) as conn:", "with self.__connect() as conn:")
          marker = "    def evidence(self, record_id: str) -> FundamentalEvidenceRecord | None:\n"
          methods = '''    def __initialize(self) -> None:\n        with self.__connect() as conn:\n            conn.executescript(SCHEMA_SQL)\n            conn.execute(\n                "INSERT OR IGNORE INTO value_capture_schema_migrations (migration_id, applied_at) VALUES (?, ?)",\n                (VALUE_CAPTURE_MIGRATION_ID, datetime.now(UTC).isoformat()),\n            )\n\n    def __connect(self) -> sqlite3.Connection:\n        conn = sqlite3.connect(self.path)\n        conn.row_factory = sqlite3.Row\n        conn.execute("PRAGMA foreign_keys = ON")\n        return conn\n\n'''
          assert marker in text
          text = text.replace(marker, methods + marker)
          start = text.index("\ndef _initialize(path: Path) -> None:\n")
          end = text.index("\ndef _identity(payload: dict[str, Any]) -> EconomicClaimIdentity:\n", start)
          text = text[:start] + text[end:]
          repo.write_text(text)

          service = Path("src/hunter/value_capture/service.py")
          text = service.read_text()
          text = text.replace("import json\n", "import json\nimport sqlite3\n")
          text = text.replace(
              "    RegisteredValueCaptureProvider,\n",
              "    AcquisitionReceipt,\n    RegisteredValueCaptureProvider,\n",
          )
          old_import = '''from hunter.value_capture.repository import (\n    SupplyAndValueCaptureRepository,\n    ValueCaptureIntegrityError,\n    _connect,\n    _insert_receipt,\n    _insert_record,\n    _table_for,\n    _validate_receipt_binding,\n)\n'''
          new_import = '''from hunter.value_capture.repository import (\n    SupplyAndValueCaptureRepository,\n    ValueCaptureIntegrityError,\n)\n'''
          assert old_import in text
          text = text.replace(old_import, new_import)
          old = '''        _validate_receipt_binding(result.receipt, record)\n        with _connect(self.repository.path) as conn:\n            conn.execute("BEGIN IMMEDIATE")\n            try:\n                _insert_receipt(conn, result.receipt)\n                _insert_record(conn, _table_for(record), record)\n            except Exception:\n                conn.rollback()\n                raise\n            conn.commit()\n'''
          new = '''        self.__validate_receipt_binding(result.receipt, record)\n        conn = sqlite3.connect(self.repository.path)\n        conn.row_factory = sqlite3.Row\n        conn.execute("PRAGMA foreign_keys = ON")\n        try:\n            conn.execute("BEGIN IMMEDIATE")\n            self.__insert_receipt(conn, result.receipt)\n            self.__insert_record(conn, self.__table_for(record), record)\n        except Exception:\n            conn.rollback()\n            raise\n        else:\n            conn.commit()\n        finally:\n            conn.close()\n'''
          assert old in text
          text = text.replace(old, new)
          marker = "    def _authorize_result(\n"
          helpers = '''    @staticmethod\n    def __validate_receipt_binding(receipt: AcquisitionReceipt, record: Record) -> None:\n        raw_hash = record.raw_content_hash if isinstance(record, FundamentalEvidenceRecord) else record.raw_payload_hash\n        if receipt.acquisition_id != record.acquisition_id:\n            raise ValueCaptureIntegrityError("record acquisition_id does not match receipt")\n        if receipt.raw_payload_hash != raw_hash:\n            raise ValueCaptureIntegrityError("record payload hash does not match receipt")\n        if receipt.source_id != record.source_id or receipt.parser_version != record.parser_version:\n            raise ValueCaptureIntegrityError("record source/parser does not match receipt")\n        if receipt.identity != record.identity:\n            raise ValueCaptureIntegrityError("record identity does not match receipt")\n        if receipt.acquired_at != record.recorded_at or receipt.acquired_at != record.known_at:\n            raise ValueCaptureIntegrityError("record chronology does not match receipt")\n\n    @staticmethod\n    def __insert_receipt(conn: sqlite3.Connection, receipt: AcquisitionReceipt) -> None:\n        payload = _json_safe(asdict(receipt))\n        canonical = json.dumps(payload, sort_keys=True, separators=(",", ":"))\n        existing = conn.execute(\n            "SELECT payload_json FROM value_capture_acquisition_receipts WHERE acquisition_id = ?",\n            (receipt.acquisition_id,),\n        ).fetchone()\n        if existing is not None:\n            if str(existing["payload_json"]) != canonical:\n                raise ValueCaptureIntegrityError("acquisition_id reused with divergent receipt")\n            return\n        conn.execute(\n            """\n            INSERT INTO value_capture_acquisition_receipts (\n                acquisition_id,receipt_hash,kind,capability,source_id,source_authority_tier,endpoint,\n                parser_version,registry_fingerprint,signing_key_id,signature,acquired_at,entity_id,economic_claim_id,\n                representation_id,raw_payload_hash,payload_json\n            ) VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)\n            """,\n            (\n                receipt.acquisition_id, receipt.receipt_hash, receipt.kind, receipt.capability,\n                receipt.source_id, receipt.source_authority_tier, receipt.endpoint, receipt.parser_version,\n                receipt.registry_fingerprint, receipt.signing_key_id, receipt.signature,\n                receipt.acquired_at.isoformat(), receipt.identity.entity_id, receipt.identity.economic_claim_id,\n                receipt.identity.representation_id, receipt.raw_payload_hash, canonical,\n            ),\n        )\n\n    @staticmethod\n    def __insert_record(conn: sqlite3.Connection, table: str, record: Record) -> None:\n        payload = _json_safe(asdict(record))\n        canonical = json.dumps(payload, sort_keys=True, separators=(",", ":"))\n        existing = conn.execute(\n            f"SELECT payload_json FROM {table} WHERE record_id = ?", (record.record_id,)\n        ).fetchone()\n        if existing is not None:\n            if str(existing["payload_json"]) != canonical:\n                raise ValueCaptureIntegrityError("record_id reused with divergent content")\n            return\n        predecessor = record.supersedes_record_id\n        if predecessor is not None:\n            row = conn.execute(\n                f"SELECT logical_id,recorded_at,known_at FROM {table} WHERE record_id = ?",\n                (predecessor,),\n            ).fetchone()\n            if row is None:\n                raise ValueCaptureIntegrityError("superseded record does not exist")\n            if str(row["logical_id"]) != record.logical_id:\n                raise ValueCaptureIntegrityError("correction must preserve logical_id")\n            if datetime.fromisoformat(str(row["recorded_at"])) >= record.recorded_at:\n                raise ValueCaptureIntegrityError("correction recorded_at must follow predecessor")\n            if datetime.fromisoformat(str(row["known_at"])) >= record.known_at:\n                raise ValueCaptureIntegrityError("correction known_at must follow predecessor")\n            successor = conn.execute(\n                f"SELECT record_id FROM {table} WHERE supersedes_record_id = ?", (predecessor,)\n            ).fetchone()\n            if successor is not None:\n                raise ValueCaptureIntegrityError("branching correction lineage is prohibited")\n        category_column = None\n        category_value = None\n        if isinstance(record, SupplyBasisSnapshot):\n            category_column, category_value = "supply_basis_type", record.supply_basis_type\n        elif isinstance(record, ValueCaptureRuleSnapshot):\n            category_column, category_value = "rule_type", record.rule_type\n        columns = [\n            "record_id", "logical_id", "entity_id", "economic_claim_id", "representation_id",\n            "source_id", "parser_version", "acquisition_id", "effective_at", "recorded_at",\n            "known_at", "quality_state", "conflict_state", "content_hash",\n            "supersedes_record_id", "payload_json",\n        ]\n        values: list[object] = [\n            record.record_id, record.logical_id, record.identity.entity_id,\n            record.identity.economic_claim_id, record.identity.representation_id, record.source_id,\n            record.parser_version, record.acquisition_id, record.effective_at.isoformat(),\n            record.recorded_at.isoformat(), record.known_at.isoformat(), record.quality_state,\n            record.conflict_state, record.content_hash, predecessor, canonical,\n        ]\n        if category_column is not None:\n            columns.insert(5, category_column)\n            values.insert(5, category_value)\n        conn.execute(\n            f"INSERT INTO {table} ({', '.join(columns)}) VALUES ({', '.join('?' for _ in columns)})",\n            tuple(values),\n        )\n\n    @staticmethod\n    def __table_for(record: Record) -> str:\n        if isinstance(record, FundamentalEvidenceRecord):\n            return "fundamental_evidence_records"\n        if isinstance(record, SupplyBasisSnapshot):\n            return "supply_basis_snapshots"\n        return "value_capture_rule_snapshots"\n\n'''
          assert marker in text
          text = text.replace(marker, helpers + marker)
          service.write_text(text)

          tests = Path("tests/test_value_capture_service_owned_persistence.py")
          text = tests.read_text()
          text = text.replace("import importlib.util\n", "import importlib.util\n\nimport hunter.value_capture.repository as repository_module\n")
          text += '''\n\ndef test_repository_module_exposes_no_write_helpers() -> None:\n    forbidden = {"_connect", "_insert_receipt", "_insert_record", "_table_for"}\n    assert forbidden.isdisjoint(set(dir(repository_module)))\n'''
          tests.write_text(text)
          PY
      - name: Verify
        run: |
          python -m pip install -e ".[dev]"
          python -m black .
          python -m ruff check --fix .
          python -m black .
          python -m ruff check .
          python -m black --check .
          python -m mypy
          python -m pytest -q
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hunter/value_capture tests/test_value_capture_service_owned_persistence.py
          git diff --cached --quiet || git commit -m "Seal value capture write helpers behind service boundary"
          git push
