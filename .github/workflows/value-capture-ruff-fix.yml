name: Value Capture Ruff Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/value-capture-ruff-fix.yml"

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - name: Capture Ruff output
        run: |
          python -m ruff check src/hunter/value_capture tests/test_value_capture_v3_5_0.py > ruff-output.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: value-capture-ruff-output
          path: ruff-output.txt
