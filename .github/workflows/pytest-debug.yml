name: Pytest Debug

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  pytest-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Capture pytest failure
        id: pytest
        shell: bash
        run: |
          set +e
          pytest > pytest-output.txt 2>&1
          status=$?
          {
            echo 'body<<EOF'
            echo '```text'
            tail -n 160 pytest-output.txt
            echo '```'
            echo EOF
          } >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Comment pytest failure
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.pytest.outputs.body }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY"
