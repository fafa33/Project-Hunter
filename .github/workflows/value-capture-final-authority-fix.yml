name: Value Capture Final Authority Fix

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/value-capture-final-authority-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Apply deterministic authority fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path("src/hunter/value_capture/providers.py")
          text = p.read_text()
          old = '''    def verify_receipt(self, receipt: AcquisitionReceipt) -> bool:\n        key = self.__keys.get(receipt.signing_key_id)\n        if key is None:\n            return False\n        expected = hmac.new(key, receipt.receipt_hash.encode(), hashlib.sha256).hexdigest()\n        return hmac.compare_digest(expected, receipt.signature)\n'''
          new = '''    def verify_receipt(self, receipt: AcquisitionReceipt) -> bool:\n        key = self.__keys.get(receipt.signing_key_id)\n        if key is None:\n            return False\n        recomputed_hash = receipt_hash_from_receipt(receipt)\n        if not hmac.compare_digest(recomputed_hash, receipt.receipt_hash):\n            return False\n        expected = hmac.new(key, recomputed_hash.encode(), hashlib.sha256).hexdigest()\n        return hmac.compare_digest(expected, receipt.signature)\n'''
          assert old in text
          text = text.replace(old, new)
          insert = '''\n\ndef receipt_hash_from_receipt(receipt: AcquisitionReceipt) -> str:\n    payload = {\n        "acquisition_id": receipt.acquisition_id,\n        "kind": receipt.kind,\n        "capability": receipt.capability,\n        "source_id": receipt.source_id,\n        "source_authority_tier": receipt.source_authority_tier,\n        "endpoint": receipt.endpoint,\n        "parser_version": receipt.parser_version,\n        "registry_fingerprint": receipt.registry_fingerprint,\n        "signing_key_id": receipt.signing_key_id,\n        "acquired_at": receipt.acquired_at.isoformat(),\n        "identity": {\n            "entity_id": receipt.identity.entity_id,\n            "economic_claim_id": receipt.identity.economic_claim_id,\n            "asset_id": receipt.identity.asset_id,\n            "representation_id": receipt.identity.representation_id,\n            "token_id": receipt.identity.token_id,\n            "chain": receipt.identity.chain,\n            "contract_address": receipt.identity.contract_address,\n        },\n        "raw_payload_hash": receipt.raw_payload_hash,\n    }\n    canonical = json.dumps(payload, sort_keys=True, separators=(",", ":"))\n    return hashlib.sha256(canonical.encode()).hexdigest()\n'''
          marker = '\n\ndef payload_hash_for(payload: dict[str, Any]) -> str:\n'
          assert marker in text
          text = text.replace(marker, insert + marker)
          p.write_text(text)

          p = Path("src/hunter/value_capture/repository.py")
          text = p.read_text()
          text = text.replace(
              "from hunter.value_capture.providers import AcquisitionReceipt, ValueCaptureVerificationKeyRegistry\n",
              "from hunter.value_capture.providers import AcquisitionReceipt\n",
          )
          old = '''    def __init__(\n        self,\n        path: str | Path = DEFAULT_VALUE_CAPTURE_DB,\n        *,\n        verification_keys: ValueCaptureVerificationKeyRegistry | None = None,\n    ) -> None:\n        self.path = Path(path)\n        self.__verification_keys = verification_keys\n'''
          new = '''    def __init__(self, path: str | Path = DEFAULT_VALUE_CAPTURE_DB) -> None:\n        self.path = Path(path)\n'''
          assert old in text
          text = text.replace(old, new)
          start = text.index("\n    def _commit_authoritative(")
          end = text.index("\n\ndef _initialize", start)
          text = text[:start] + text[end:]
          p.write_text(text)

          p = Path("src/hunter/value_capture/service.py")
          text = p.read_text()
          text = text.replace(
              "from hunter.value_capture.providers import RegisteredValueCaptureProvider, ValueCaptureAcquisitionResult\n",
              "from hunter.value_capture.authority import _ValueCaptureAuthorityWriter\nfrom hunter.value_capture.providers import (\n    RegisteredValueCaptureProvider,\n    ValueCaptureAcquisitionResult,\n    ValueCaptureVerificationKeyRegistry,\n)\n",
          )
          old = '''    def __init__(self, *, registry: ValueCaptureSourceRegistry, repository: SupplyAndValueCaptureRepository) -> None:\n        self.registry = registry\n        self.repository = repository\n'''
          new = '''    def __init__(\n        self,\n        *,\n        registry: ValueCaptureSourceRegistry,\n        repository: SupplyAndValueCaptureRepository,\n        verification_keys: ValueCaptureVerificationKeyRegistry,\n    ) -> None:\n        self.registry = registry\n        self.repository = repository\n        self.__writer = _ValueCaptureAuthorityWriter(\n            repository=repository,\n            verification_keys=verification_keys,\n        )\n'''
          assert old in text
          text = text.replace(old, new)
          text = text.replace("self.repository._commit_authoritative(result.receipt, normalized)", "self.__writer.persist(result.receipt, normalized)")
          p.write_text(text)

          p = Path("tests/test_value_capture_v3_5_0.py")
          text = p.read_text()
          old = '''    repository = SupplyAndValueCaptureRepository(\n        tmp_path / "value-capture.sqlite",\n        verification_keys=ValueCaptureVerificationKeyRegistry({SIGNING_KEY_ID: SIGNING_KEY}),\n    )\n    service = SupplyAndValueCaptureService(\n        registry=ValueCaptureSourceRegistry(configs),\n        repository=repository,\n    )\n'''
          new = '''    verification_keys = ValueCaptureVerificationKeyRegistry({SIGNING_KEY_ID: SIGNING_KEY})\n    repository = SupplyAndValueCaptureRepository(tmp_path / "value-capture.sqlite")\n    service = SupplyAndValueCaptureService(\n        registry=ValueCaptureSourceRegistry(configs),\n        repository=repository,\n        verification_keys=verification_keys,\n    )\n'''
          assert old in text
          text = text.replace(old, new)
          old = '''    repository = SupplyAndValueCaptureRepository(\n        tmp_path / "value-capture.sqlite",\n        verification_keys=ValueCaptureVerificationKeyRegistry({SIGNING_KEY_ID: SIGNING_KEY}),\n    )\n    assert not hasattr(repository, "apply")\n'''
          new = '''    repository = SupplyAndValueCaptureRepository(tmp_path / "value-capture.sqlite")\n    assert not hasattr(repository, "_commit_authoritative")\n    assert not hasattr(repository, "apply")\n'''
          assert old in text
          text = text.replace(old, new)
          anchor = '''def test_cross_provider_signature_forgery_is_rejected(tmp_path) -> None:\n'''
          test = '''def test_receipt_hash_is_recomputed_before_signature_verification(tmp_path) -> None:\n    service, _, provider = setup(tmp_path)\n    result = evidence_result(provider)\n    forged_hash = "0" * 64\n    forged_signature = __import__("hmac").new(\n        SIGNING_KEY, forged_hash.encode(), __import__("hashlib").sha256\n    ).hexdigest()\n    forged = replace(\n        result,\n        receipt=replace(result.receipt, receipt_hash=forged_hash, signature=forged_signature),\n    )\n    with pytest.raises(SupplyAndValueCaptureAuthorityError, match="invalid"):\n        service.ingest_evidence(provider, forged)\n\n\n'''
          assert anchor in text
          text = text.replace(anchor, test + anchor)
          p.write_text(text)
          PY
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Format and verify every quality gate
        run: |
          python -m black .
          python -m ruff check --fix .
          python -m black .
          python -m ruff check .
          python -m black --check .
          python -m mypy
          python -m pytest -q
      - name: Commit verified remediation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hunter/value_capture tests/test_value_capture_v3_5_0.py
          git diff --cached --quiet || git commit -m "Close final value capture authority blockers"
          git push
