name: Market Facts Black Autofix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install 'black>=24,<25'
      - run: black src/hunter/market_facts tests/test_market_facts_v3_4_0.py
      - name: Commit formatting when needed
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/hunter/market_facts tests/test_market_facts_v3_4_0.py
          git commit -m "Format v3.4.0 market facts"
          git push origin HEAD:${{ github.head_ref }}
