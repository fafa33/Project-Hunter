      exchange_inflows: NO_DOCUMENTED_FREE_SOURCE
      exchange_outflows: NO_DOCUMENTED_FREE_SOURCE
      net_exchange_flows: NO_DOCUMENTED_FREE_SOURCE
      large_transaction_activity: NO_DOCUMENTED_FREE_SOURCE
