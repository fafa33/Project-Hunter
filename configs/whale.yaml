enabled: true
stale_after_hours: 24
providers:
  binance_derivatives:
    enabled: true
    base_url: https://fapi.binance.com
    assets:
      BTC: BTCUSDT
      ETH: ETHUSDT
    metrics:
      open_interest: open_interest
      funding_rate: funding_rate
  bybit_derivatives:
    enabled: true
    base_url: https://api.bybit.com
    assets:
      BTC: BTCUSDT
      ETH: ETHUSDT
    metrics:
      open_interest: open_interest
      funding_rate: funding_rate
  okx_derivatives:
    enabled: true
    base_url: https://www.okx.com
    assets:
      BTC: BTC-USDT-SWAP
      ETH: ETH-USDT-SWAP
    metrics:
      open_interest: open_interest
      funding_rate: funding_rate
  unavailable_public_sources:
    enabled: false
    base_url: unavailable://no-documented-free-source
