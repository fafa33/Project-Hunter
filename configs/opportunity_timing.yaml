enabled: false
required_historical_depth: 3
min_confirmation_groups: 2
min_category_coverage: 0.5
freshness_grace_days: 7
freshness_window_days: 30
required_categories:
  - macro
  - whale
  - developer
  - protocol
  - news
  - narrative
  - social
  - on-chain
phase_thresholds:
  too_early: 20
  forming: 40
  early_entry: 60
  confirmed_entry: 75
  expansion: 90
window_thresholds:
  closed: 20
  watch: 40
  opening: 60
  open: 75
  strengthening: 90
risk_weights:
  contradiction: 0.25
  missing_evidence: 0.2
  dependency: 0.2
  divergence: 0.2
  insufficient_history: 0.15
confidence_weights:
  history: 0.2
  diversity: 0.2
  coverage: 0.2
  independence: 0.15
  freshness: 0.1
  fusion: 0.15
contradiction_penalty: 18
missing_evidence_penalty: 3
divergence_penalty: 15
acceleration_bonus: 12
confirmation_bonus: 18
persistence_bonus: 10
acceleration_rules:
  positive_acceleration: 0.08
  negative_acceleration: -0.08
  stalled_delta: 0.02
  reversal_delta: -0.08
divergence_rules:
  social_high: 0.75
  fundamental_low: 0.45
  fundamental_high: 0.65
  attention_low: 0.4
  whale_high: 0.7
  narrative_high: 0.7
  macro_low: 0.4
  social_saturation: 0.85
horizon_rules:
  weeks: 75
  1-3 months: 75
  3-6 months: 60
  6-12 months: 40
  12-24 months: 20
invalidation_rules:
  - loss_of_independent_confirmation
  - material_increase_in_contradiction_severity
  - sustained_negative_acceleration
  - continued_absence_of_required_evidence
  - risk_state_worsens
  - divergence_remains_unresolved
  - confirmation_threshold_not_maintained
model_version: opportunity-timing-model-v1
