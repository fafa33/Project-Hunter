evaluation_windows: [7, 30, 90, 180, 365, 730]
minimum_sample_size: 30
success_threshold: 0.0
failure_threshold: -0.5
benchmarks: [bitcoin, ethereum, total_crypto_market, sector_index, peer_group_median]
calibration_buckets: [0.0, 0.25, 0.5, 0.75, 1.0]
acceptable_freshness: 0.5
required_evidence:
  - valuation
  - comparative_valuation
  - mispricing
  - asymmetry
  - developer
  - protocol
  - probability
  - opportunity_timing
  - risk
  - committee
maximum_missing_evidence: 21
leakage_rules:
  - publication_timestamp_lte_cutoff
  - ingestion_timestamp_lte_cutoff
  - event_timestamp_lte_cutoff
  - no_current_status_substitution
  - no_current_supply_substitution
  - no_future_graph_edges
  - no_future_outcomes_in_inputs
snapshot_versioning: true
outcome_labels:
  major_winner_return: 5.0
  moderate_winner_return: 1.0
  severe_underperformer_return: -0.8
